
<div class="rain-container">
  <img
    *ngFor="let item of rainItems"
    class="ingredient"
    [src]="item.icono"
    [alt]="item.nombre"
    [style.left]="item.left"
    [style.width]="item.size"
    [style.animation-duration]="item.duration"
    [style.animation-delay]="item.delay"
  >
</div>

<div class="page-center">
  <div class="card">
    <div class="card-title">
      <span class="spark"></span>Panchito<span class="spark"></span>
    </div>
    <div class="card-subtitle">
      Armá el pancho que quieras,<br>nosotros ponemos.
    </div>

  
    <div class="pancho-stage">
      <div class="pancho-layer layer-pan-top"    [class.show]="step >= 1"></div>
      <div class="pancho-layer layer-salchicha"  [class.show]="step >= 2"></div>
      <div class="pancho-layer layer-salsas"     [class.show]="step >= 3">
        <div class="salsa-ketchup"></div>
        <div class="salsa-mostaza"></div>
      </div>
      <div class="pancho-layer layer-extras"     [class.show]="step >= 4">
        <img src="assets/icons/pepino.png"   class="extra-icon" alt="pepino">
        <img src="assets/icons/cebolla.png"  class="extra-icon" alt="cebolla">
        <img src="assets/icons/ketchup.png"  class="extra-icon" alt="ketchup">
      </div>
      <div class="pancho-layer layer-pan-bottom" [class.show]="step >= 5"></div>
    </div>


    <div class="steps">
      <div class="step" [class.active]="step >= 1">
        <img src="assets/icons/step-pan.png" class="step-icon-img" alt="pan">
        <span class="step-label">1 Pan</span>
      </div>
      <div class="step" [class.active]="step >= 2">
        <img src="assets/icons/step-salchicha.png" class="step-icon-img" alt="salchicha">
        <span class="step-label">2 Salchicha</span>
      </div>
      <div class="step" [class.active]="step >= 3">
        <img src="assets/icons/step-salsas.png" class="step-icon-img" alt="salsas">
        <span class="step-label">3 Salsas</span>
      </div>
      <div class="step" [class.active]="step >= 4">
        <img src="assets/icons/step-extras.png" class="step-icon-img" alt="extras">
        <span class="step-label">4 Extras</span>
      </div>
      <div class="step" [class.active]="step >= 5">
        <img src="assets/icons/step-listo.png" class="step-icon-img" alt="listo">
        <span class="step-label">5 ¡Listo!</span>
      </div>
    </div>

    <!-- <div class="amor" [class.show]="step >= 5">
      <img src="assets/icons/step-listo.png" class="amor-icon" alt="amor">
      Hecho con amor
    </div> nose si agregarlo queda muy cargado-->

    <div class="btns">
      <button class="btn btn-crear" routerLink="/crear">
        <div class="water"></div>
        <div class="label">
          <img src="assets/icons/agregar.png" class="btn-icon" alt="crear">
          Crear Pancho
        </div>
      </button>
      <button class="btn btn-ver" routerLink="/menu">
        <div class="water"></div>
        <div class="label">
          <img src="assets/icons/menu.png" class="btn-icon" alt="menu">
          Ver Menú
        </div>
      </button>
    </div>
  </div>
</div>
